overwrite: true

schema: "http://localhost:3000/graphql"

documents: "src/graphql/**/*.graphql"

generates:
  src/__generated__/:
    preset: client
    presetConfig:
      fragmentMasking: false
    config:
      enumsAsTypes: true
      useTypeImports: true
      scalars:
        BigInt:
          input: string
          output: string
        DateTime:
          input: string
          output: string
